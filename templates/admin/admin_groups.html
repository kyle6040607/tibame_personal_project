<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新建群組</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <h1>{{ message }}</h1>
    <p>目前登入者：{{ username }}</p>

    <a href="/admin/dashboard?username={{ username }}">回 Admin 目錄</a>
    <hr>

    <form action="/add-group" method="post">
        <input type="hidden" name="username" value="{{ username }}">

        <label>群組名稱：</label><br>
        <input type="text" name="group_name" required>
        <br><br>

        <label>群組說明：</label><br>
        <textarea name="group_description" rows="4" cols="50" required></textarea>
        <br><br>

        <button type="submit">新增群組</button>
    </form>

    <hr>
    <h2>現有群組</h2>

    {% if groups %}
    <table border="1" cellpadding="8" cellspacing="0">
        <tr>
            <th>ID</th>
            <th>群組名稱</th>
            <th>群組說明</th>
            <th>操作</th>
        </tr>
        {% for group in groups %}
        <tr>
            <td>{{ group.id }}</td>
            <td>{{ group.name }}</td>
            <td>{{ group.description }}</td>
            <td>
                <form action="/delete-group" method="post" style="margin: 0;">
                    <input type="hidden" name="username" value="{{ username }}">
                    <input type="hidden" name="group_id" value="{{ group.id }}">
                    <button type="submit" onclick="return confirm('確定要刪除這個群組嗎？')">
                        刪除群組
                    </button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </table>
    {% else %}
    <p>目前沒有任何群組。</p>
    {% endif %}
</body>
</html>
