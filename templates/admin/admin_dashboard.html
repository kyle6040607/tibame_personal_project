<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin 目錄</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <h1>{{ message }}</h1>
    <p>目前登入者：{{ username }}</p>

    <h2>管理功能目錄</h2>
    <ul>
        <li><a href="/admin/groups?username={{ username }}">編輯群組</a></li>
        <li><a href="/admin/upload?username={{ username }}">上傳文件</a></li>
        <li><a href="/admin/delete?username={{ username }}">刪除文件</a></li>  
    </ul>

    <br>
    <a href="/">回登入頁</a>
</body>
</html>
